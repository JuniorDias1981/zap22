<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar do Zè</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- HEADER -->
<header class="header">
  <div class="header-left">
    <!-- Logo do site Zap22 -->
    <a href="../index.html" class="logo-site">
      <img src="img/zap22.png" alt="Zap22" />
    </a>

    <!-- Logo do comércio centralizada -->
    <div class="logo-comercio">
      <img src="img/logo.png" alt="Bar do Zé" />
    </div>
  </div>

  <!-- Select de bairros -->
  <select id="select-bairro">
    <option value="">Selecione o bairro</option>
  </select>

  <!-- Botão do carrinho -->
  <button class="cart-btn" onclick="abrirCarrinho()">
    Carrinho (<span id="cart-count">0</span>)
  </button>
</header>


  <section class="mapa">
  <h2>Nosso Local</h2>
  <div class="map-container">
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1852.966643514099!2d-41.32809291961851!3d-21.74411188992144!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xbdd45641ce47cb%3A0x8cfede4f16935e16!2sPra%C3%A7a%20Santo%20Ant%C3%B4nio%2C%2074-82%20-%20Campos%20dos%20Goytacazes%2C%20RJ%2C%2028080-515!5e0!3m2!1spt-BR!2sbr!4v1769318348097!5m2!1spt-BR!2sbr"
      width="100%"
      height="400"
      style="border:0;"
      allowfullscreen=""
      loading="lazy"
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </div>
</section>

  <!-- PRODUTOS -->
<main class="produtos" id="produtos">
  <!-- Produtos gerados pelo JS -->
</main>

<!-- OVERLAY -->
<div id="overlay" class="overlay" onclick="fecharCarrinho()"></div>

<!-- CARRINHO / MODAL -->
<div id="carrinho" class="modal">
  <div class="modal-header">
    <h2>Carrinho</h2>
    <button class="close" onclick="fecharCarrinho()">×</button>
  </div>
  <div id="carrinho-itens" class="carrinho-body"></div>
  <div id="carrinho-resumo" class="resumo"></div>
  <div class="carrinho-actions">
    <button class="btn-outline" onclick="limparCarrinho()">Limpar Carrinho</button>
    <button class="btn-primary" onclick="mostrarFormulario()">Finalizar Pedido</button>
  </div>

  <!-- FORMULÁRIO -->
  <div id="formulario" class="form hidden">
    <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="endereco" placeholder="Endereço" required>
    <select id="bairro-form" required></select>
    <select id="pagamento" required>
      <option value="">Forma de pagamento</option>
      <option value="Dinheiro">Dinheiro</option>
      <option value="Pix">Pix</option>
      <option value="Cartão">Cartão</option>
    </select>
    <textarea id="observacoes" placeholder="Observações"></textarea>
    <button class="btn-primary" onclick="enviarPedido()">Enviar Pedido</button>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-container">
    <h3>Bar do Zé</h3>
    <p>Faça seus pedidos diretamente do seu bairro e receba em casa!</p>
   <!-- LINKS -->
  <p><div class="footer-links">
      <h4>Redes sociais</h4>
      <a 
        href="https://www.instagram.com" 
        target="_blank" 
        rel="noopener noreferrer"
        aria-label="Instagram PedeAí">
        Instagram
      </a>
    </div></p>
    <!-- COPY -->
    <div class="footer-copy">
      <p>
        © <span id="ano-footer"></span> PedeAí <br>
        Todos os direitos reservados.
      </p>
      <p class="footer-dev">
        Desenvolvido por 
        <a href="mailto:jrdias32@gmail.com">Junior Dias</a>
      </p>
    </div>
</footer>
<script src="main.js"></script>

</body>
</html>
